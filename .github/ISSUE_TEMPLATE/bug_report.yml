name: Bug report
description: Report a reproducible problem in Mompy
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Mompy. Please describe the problem clearly so it can be reproduced.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen.
      placeholder: "Example: The mission editor does not run the code after pressing Ctrl+Enter."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps.
      placeholder: |
        1. Open Mompy
        2. Click Start
        3. Open Mission 01
        4. Press Run
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "What should Mompy have done instead?"
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots, video or logs
      description: Drag screenshots, recordings or console logs here if they help.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Start screen / profile
        - Guided lessons
        - Missions
        - Code editor
        - Validation
        - Progress / XP / level
        - Audio
        - Desktop packaging
        - GitHub / README
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: "v0.1.0, latest main, or commit hash"
    validations:
      required: false
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11, macOS, Linux..."
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      placeholder: "Anything else that may help."
    validations:
      required: false
